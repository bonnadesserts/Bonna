<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BonnaGo · Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230B2465'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Poppins,Arial,sans-serif' font-size='62' font-weight='700' fill='white'>B</text></svg>">
</head>
<body class="admin-body">

  <!-- Login view (se muestra si no hay sesión) -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-card__brand">
        <div class="brand__mark">B</div>
        <span>BonnaGo <em style="color:var(--ink-3);font-style:normal;font-weight:400;">· admin</em></span>
      </div>
      <h1>Bienvenido 👋</h1>
      <p>Entra a gestionar tu catálogo, promociones y métodos de pago.</p>

      <div class="login-err" id="loginErr"></div>

      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="l-email" autocomplete="username" placeholder="admin@bonnago.co" required>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="l-pass" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--primary" style="margin-top:6px;">Ingresar</button>
      </form>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
